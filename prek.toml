[[repos]]
repo = "local"

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
language = "system"
entry = "cargo fmt"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
language = "system"
entry = "cargo clippy -- -D warnings"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "biome-check"
name = "biome check"
language = "system"
entry = "bash -c 'cd frontend && npx biome check --write .'"
files = "^frontend/"
pass_filenames = false

[[repos.hooks]]
id = "svelte-check"
name = "svelte check"
language = "system"
entry = "bash -c 'cd frontend && npx svelte-check --tsconfig tsconfig.json'"
files = "^frontend/"
pass_filenames = false

[[repos.hooks]]
id = "npm-test"
name = "npm test"
language = "system"
entry = "npm test --prefix frontend"
files = "^frontend/"
pass_filenames = false
